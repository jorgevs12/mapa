<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ruido</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8fafc;
    --card:#ffffff;
    --border:rgba(0,0,0,0.08);
    --text:#1e293b;
    --muted:#64748b;
    --radius:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#0f172a;--card:#1e293b;--border:rgba(255,255,255,0.08);--text:#f1f5f9;--muted:#94a3b8}
  }
  html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
  #grid{
    display:grid;
    gap:16px;
    padding:16px;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  }
  /* Single chart when screen is narrow or only 1 visible */
  @media(max-width:640px){#grid{grid-template-columns:1fr}}
  .card{
    background:var(--card);
    border:0.5px solid var(--border);
    border-radius:var(--radius);
    padding:16px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted)}
  .leg{display:flex;align-items:center;gap:4px}
  .leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .chart-wrap{position:relative;width:100%;height:220px}
  .chart-wrap.taller{height:260px}
  .empty{display:flex;align-items:center;justify-content:center;height:160px;font-size:13px;color:var(--muted)}
  #loading{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;font-size:14px;color:var(--muted);z-index:100;
  }
  #loading svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error{
    position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;font-size:14px;color:#e24b4a;display:none;
  }
</style>
</head>
<body>

<div id="loading">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="10" stroke-opacity=".2"/>
    <path d="M12 2a10 10 0 0 1 10 10"/>
  </svg>
  Cargando datos…
</div>
<div id="error">
  <span id="error-msg">No se pudieron cargar los datos.</span>
  <small style="color:var(--muted)">Comprueba la ruta del JSON y los parámetros.</small>
</div>

<div id="grid" style="display:none"></div>

<script>
// ─────────────────────────────────────────────
//  PALETA
// ─────────────────────────────────────────────
const PAL = ['#185FA5','#3B6D11','#BA7517','#993556','#0F6E56','#993C1D','#534AB7','#888780'];
const STATUS_COL = {Normal:'#3B6D11',Moderado:'#BA7517',Alto:'#185FA5','Crítico':'#E24B4A'};
function hex2rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
const GRID_COLOR = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
const TICK_COLOR = isDark ? '#94a3b8' : '#64748b';

// ─────────────────────────────────────────────
//  PARÁMETROS URL
// ─────────────────────────────────────────────
/*
  Parámetros soportados:
    src        → ruta al JSON (obligatorio, default: datos.json)
    estado     → Normal,Moderado,Alto,Crítico  (separados por coma)
    perfil     → Anónimo,Joven,Investigador    (separados por coma)
    ubicacion  → Plaza Mayor,Casco Antiguo,…   (separados por coma)
    desde      → HH:MM  (hora inicio, formato 24h)
    hasta      → HH:MM  (hora fin,   formato 24h)
    chart      → barras | linea | circular | todos
                 · "todos"   → muestra las 4 gráficas en grid
                 · nombre    → muestra solo esa gráfica a pantalla completa
                 · omitido   → auto (todos en pantalla grande, 1 en móvil)
    fecha      → YYYY-MM-DD o DD/MM/YYYY  (filtra por fecha si el JSON tiene campo "fecha")

  Ejemplo:
    dashboard.html?src=data/ruido.json&estado=Alto,Crítico&desde=14:00&hasta=18:00&chart=todos
*/
const P = new URLSearchParams(location.search);
const SRC        = P.get('src')       || 'datos.json';
const F_ESTADO   = P.get('estado')    ? P.get('estado').split(',').map(s=>s.trim())   : null;
const F_PERFIL   = P.get('perfil')    ? P.get('perfil').split(',').map(s=>s.trim())   : null;
const F_UBICACION= P.get('ubicacion') ? P.get('ubicacion').split(',').map(s=>s.trim()): null;
const F_DESDE    = P.get('desde')     || null;
const F_HASTA    = P.get('hasta')     || null;
const F_FECHA    = P.get('fecha')     || null;
const F_CHART    = P.get('chart')     || 'todos';

// ─────────────────────────────────────────────
//  UTILIDADES
// ─────────────────────────────────────────────
const uniq = (arr,key) => [...new Set(arr.map(d=>d[key]))].sort();
const avg  = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
function toMin(t){ if(!t)return 0; const [h,m]=t.split(':').map(Number); return h*60+(m||0); }

function normalizeHora(h){
  // acepta HH:MM:SS o HH:MM
  return h ? h.substring(0,5) : '';
}

// ─────────────────────────────────────────────
//  FILTRADO
// ─────────────────────────────────────────────
function filterData(raw){
  const from = F_DESDE ? toMin(F_DESDE) : 0;
  const to   = F_HASTA ? toMin(F_HASTA) : 1440;
  return raw.filter(d => {
    const t = toMin(normalizeHora(d.hora||d.HORA||d.time||''));
    if(t < from || t > to) return false;
    const est  = d.estado    || d.ESTADO    || '';
    const per  = d.perfil    || d.PERFIL    || '';
    const ubic = d.ubicacion || d.UBICACION || '';
    const fec  = d.fecha     || d.FECHA     || '';
    if(F_ESTADO    && !F_ESTADO.includes(est))    return false;
    if(F_PERFIL    && !F_PERFIL.includes(per))    return false;
    if(F_UBICACION && !F_UBICACION.includes(ubic))return false;
    if(F_FECHA){
      const norm = fec.replace(/\//g,'-');
      if(!norm.includes(F_FECHA) && !F_FECHA.includes(norm)) return false;
    }
    return true;
  });
}

// normalizar claves (mayús / minús / variantes)
function normalize(raw){
  return raw.map(d=>({
    hora:      d.hora      || d.HORA      || d.time     || '',
    ubicacion: d.ubicacion || d.UBICACION || d.location || '',
    db:        Number(d.db || d.DB || d.dB || d.decibels || 0),
    perfil:    d.perfil    || d.PERFIL    || d.profile  || '',
    estado:    d.estado    || d.ESTADO    || d.status   || '',
    fecha:     d.fecha     || d.FECHA     || d.date     || ''
  }));
}

// ─────────────────────────────────────────────
//  OPCIONES BASE CHART.JS
// ─────────────────────────────────────────────
function baseOpts(type){
  const isDoughnut = type==='doughnut';
  return {
    responsive:true,
    maintainAspectRatio:false,
    animation:{duration:600,easing:'easeOutQuart'},
    plugins:{legend:{display:false}},
    scales: isDoughnut ? {} : {
      y:{
        beginAtZero:true,
        grid:{color:GRID_COLOR,drawTicks:false},
        border:{display:false},
        ticks:{color:TICK_COLOR,font:{size:11},padding:6}
      },
      x:{
        grid:{display:false},
        border:{display:false},
        ticks:{color:TICK_COLOR,font:{size:11},maxRotation:35,autoSkip:true,maxTicksLimit:10}
      }
    }
  };
}

function ttBase(){
  return {
    backgroundColor: isDark?'#1e293b':'#ffffff',
    titleColor:      isDark?'#f1f5f9':'#1e293b',
    bodyColor:       isDark?'#94a3b8':'#64748b',
    borderColor:     isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)',
    borderWidth:1,padding:10,cornerRadius:8,
    displayColors:false
  };
}

const instances = {};
function destroyChart(id){if(instances[id]){instances[id].destroy();delete instances[id];}}

// ─────────────────────────────────────────────
//  CONSTRUCCIÓN DE TARJETA
// ─────────────────────────────────────────────
function makeCard(id, title, tall=false){
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="card-title">${title}</div>
    <div class="legend" id="leg-${id}"></div>
    <div class="chart-wrap${tall?' taller':''}"><canvas id="${id}"></canvas></div>`;
  document.getElementById('grid').appendChild(card);
}

function buildLegend(id, labels, colors){
  const el=document.getElementById('leg-'+id);
  if(!el)return;
  el.innerHTML=labels.map((l,i)=>
    `<span class="leg"><span class="leg-dot" style="background:${colors[i%PAL.length]}"></span>${l}</span>`
  ).join('');
}

function showEmpty(id){
  const wrap=document.querySelector(`#${id}`)?.parentNode;
  if(wrap) wrap.innerHTML='<div class="empty">Sin datos para los filtros seleccionados</div>';
}

// Tipo Chart.js según parámetro
function resolveType(wantedType){
  if(wantedType==='linea')   return 'line';
  if(wantedType==='circular')return 'doughnut';
  return 'bar'; // default barras
}

// ─────────────────────────────────────────────
//  GRÁFICA 1 — Media dB por ubicación
// ─────────────────────────────────────────────
function chart_ubicacion(data, type){
  const id='c-ubicacion';
  const ubics=uniq(data,'ubicacion');
  if(!ubics.length||!data.length)return showEmpty(id);
  const items=ubics.map((u,i)=>{
    const pts=data.filter(d=>d.ubicacion===u).map(d=>d.db);
    return{label:u,mean:avg(pts),count:pts.length,col:PAL[i%PAL.length]};
  });
  const t=resolveType(type);
  destroyChart(id);
  const labels=items.map(it=>it.label.length>16?it.label.slice(0,15)+'…':it.label);
  const vals=items.map(it=>+it.mean.toFixed(1));
  const cols=items.map(it=>it.col);
  instances[id]=new Chart(document.getElementById(id),{
    type:t,
    data:{labels,datasets:[{
      label:'Media dB',data:vals,
      backgroundColor:t==='doughnut'?cols:cols.map(c=>hex2rgba(c,.65)),
      borderColor:cols,borderWidth:t==='doughnut'?3:1.5,
      borderRadius:t==='bar'?4:0,fill:false,tension:.3
    }]},
    options:{...baseOpts(t),plugins:{...baseOpts(t).plugins,tooltip:{
      ...ttBase(),
      callbacks:{
        title:i=>items[i[0].dataIndex].label,
        label:i=>[`  Media dB: ${items[i.dataIndex].mean.toFixed(1)}`,`  Mediciones: ${items[i.dataIndex].count}`]
      }
    }}}
  });
  buildLegend(id,labels,cols);
}

// ─────────────────────────────────────────────
//  GRÁFICA 2 — dB a lo largo del tiempo
// ─────────────────────────────────────────────
function chart_tiempo(data, type){
  const id='c-tiempo';
  const sorted=[...data].sort((a,b)=>a.hora.localeCompare(b.hora));
  if(!sorted.length)return showEmpty(id);
  const t=type==='circular'?'line':resolveType(type);
  const col='#185FA5';
  destroyChart(id);
  const globalMean=avg(sorted.map(d=>d.db));
  const n=sorted.length;
  instances[id]=new Chart(document.getElementById(id),{
    type:t,
    data:{
      labels:sorted.map(d=>normalizeHora(d.hora)),
      datasets:[{
        label:'dB',
        data:sorted.map(d=>d.db),
        backgroundColor:hex2rgba(col,.15),
        borderColor:col,borderWidth:2,
        pointRadius:sorted.length>30?2:4,
        pointBackgroundColor:col,
        fill:t==='line',tension:.3
      }]
    },
    options:{...baseOpts(t),plugins:{...baseOpts(t).plugins,tooltip:{
      ...ttBase(),
      callbacks:{
        title:i=>sorted[i[0].dataIndex].hora+' — '+sorted[i[0].dataIndex].ubicacion,
        label:i=>[
          `  dB: ${sorted[i.dataIndex].raw}`,
          `  Perfil: ${sorted[i.dataIndex].dataset?.label?'':sorted[i.dataIndex].dataset?.label||''}`,
        ],
        afterLabel:i=>{
          const d=sorted[i.dataIndex];
          return[`  Perfil: ${d.perfil}`,`  Estado: ${d.estado}`,
                 `  Media total: ${globalMean.toFixed(1)} dB`,`  N: ${n}`];
        }
      }
    }}}
  });
  buildLegend(id,['dB registrado'],[col]);
}

// ─────────────────────────────────────────────
//  GRÁFICA 3 — Distribución de estados
// ─────────────────────────────────────────────
function chart_estados(data, type){
  const id='c-estados';
  if(!data.length)return showEmpty(id);
  const estados=uniq(data,'estado');
  const items=estados.map(e=>{
    const pts=data.filter(d=>d.estado===e).map(d=>d.db);
    return{label:e,count:data.filter(d=>d.estado===e).length,mean:avg(pts)};
  });
  const cols=estados.map(e=>STATUS_COL[e]||PAL[0]);
  const t=type==='linea'?'bar':resolveType(type);
  const total=data.length;
  destroyChart(id);
  instances[id]=new Chart(document.getElementById(id),{
    type:t,
    data:{labels:estados,datasets:[{
      data:items.map(it=>it.count),
      backgroundColor:t==='doughnut'?cols:cols.map(c=>hex2rgba(c,.7)),
      borderColor:cols,borderWidth:t==='doughnut'?3:1.5,
      borderRadius:t==='bar'?4:0
    }]},
    options:{...baseOpts(t),plugins:{...baseOpts(t).plugins,tooltip:{
      ...ttBase(),
      callbacks:{
        title:i=>items[i[0].dataIndex].label,
        label:i=>[
          `  Mediciones: ${items[i.dataIndex].count}`,
          `  % del total: ${((items[i.dataIndex].count/total)*100).toFixed(1)}%`,
          `  Media dB: ${items[i.dataIndex].mean.toFixed(1)}`,
          `  Total filtrado: ${total}`
        ]
      }
    }}}
  });
  buildLegend(id,estados,cols);
}

// ─────────────────────────────────────────────
//  GRÁFICA 4 — Distribución de perfiles
// ─────────────────────────────────────────────
function chart_perfiles(data, type){
  const id='c-perfiles';
  if(!data.length)return showEmpty(id);
  const perfiles=uniq(data,'perfil');
  const items=perfiles.map((p,i)=>{
    const pts=data.filter(d=>d.perfil===p).map(d=>d.db);
    return{label:p,count:pts.length,mean:avg(pts),col:PAL[i%PAL.length]};
  });
  const t=resolveType(type);
  destroyChart(id);
  instances[id]=new Chart(document.getElementById(id),{
    type:t,
    data:{
      labels:perfiles,
      datasets:[{
        data:t==='doughnut'?items.map(it=>it.count):items.map(it=>+it.mean.toFixed(1)),
        backgroundColor:t==='doughnut'?items.map(it=>it.col):items.map(it=>hex2rgba(it.col,.7)),
        borderColor:items.map(it=>it.col),
        borderWidth:t==='doughnut'?3:1.5,
        borderRadius:t==='bar'?4:0,
        fill:false,tension:.3
      }]
    },
    options:{...baseOpts(t),plugins:{...baseOpts(t).plugins,tooltip:{
      ...ttBase(),
      callbacks:{
        title:i=>items[i[0].dataIndex].label,
        label:i=>[
          `  Mediciones: ${items[i.dataIndex].count}`,
          `  Media dB: ${items[i.dataIndex].mean.toFixed(1)}`
        ]
      }
    }}}
  });
  buildLegend(id,perfiles,items.map(it=>it.col));
}

// ─────────────────────────────────────────────
//  MAPA DE GRÁFICAS
// ─────────────────────────────────────────────
const CHARTS_DEF = [
  {id:'c-ubicacion', title:'Media dB por ubicación',      fn:chart_ubicacion, tall:false},
  {id:'c-tiempo',    title:'dB a lo largo del tiempo',    fn:chart_tiempo,    tall:true },
  {id:'c-estados',   title:'Distribución de estados',     fn:chart_estados,   tall:false},
  {id:'c-perfiles',  title:'Distribución de perfiles',    fn:chart_perfiles,  tall:false}
];

// ─────────────────────────────────────────────
//  RENDER PRINCIPAL
// ─────────────────────────────────────────────
function render(data){
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  // Determinar qué tipo de gráfica mostrar
  // F_CHART puede ser: todos | barras | linea | circular | nombre-de-grafica específica
  const validCharts=['c-ubicacion','c-tiempo','c-estados','c-perfiles'];
  const isSingle = F_CHART !== 'todos' && validCharts.includes(F_CHART);
  const chartType = ['barras','linea','circular'].includes(F_CHART) ? F_CHART : 'barras';

  let toRender;
  if(isSingle){
    // Solo la gráfica pedida
    toRender = CHARTS_DEF.filter(c=>c.id===F_CHART);
    grid.style.gridTemplateColumns='1fr';
  } else if(F_CHART==='todos' || ['barras','linea','circular'].includes(F_CHART)){
    toRender = CHARTS_DEF;
    grid.style.gridTemplateColumns='';
  } else {
    toRender = CHARTS_DEF;
    grid.style.gridTemplateColumns='';
  }

  toRender.forEach(c=>makeCard(c.id, c.title, c.tall));

  // Tipo de chart a pasar a cada función
  const type = ['barras','linea','circular'].includes(F_CHART) ? F_CHART : 'barras';

  toRender.forEach(c=>c.fn(data, type));
}

// ─────────────────────────────────────────────
//  CARGA DE DATOS
// ─────────────────────────────────────────────
(async()=>{
  try{
    const res = await fetch(SRC);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // El JSON puede ser un array directo o tener una clave envolvente
    let raw = Array.isArray(json) ? json
            : (json.data || json.mediciones || json.records || json.results
               || Object.values(json).find(v=>Array.isArray(v)) || []);

    if(!raw.length) throw new Error('JSON vacío o sin datos reconocibles');

    const normalData = normalize(raw);
    const filtered   = filterData(normalData);

    document.getElementById('loading').style.display='none';
    document.getElementById('grid').style.display='grid';
    render(filtered);

  } catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-msg').textContent=`Error cargando datos: ${e.message}`;
    document.getElementById('error').style.display='flex';
  }
})();
</script>
</body>
</html>
