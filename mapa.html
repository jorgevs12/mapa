<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ruido - Cáceres</title>
    
    <!-- Librería Leaflet para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* Estilos de la Leyenda */
        .info.legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            line-height: 1.5;
            color: #333;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
            border-radius: 50%;
        }
        
        /* Panel flotante de información de parámetros */
        #panel-info {
            position: absolute;
            top: 10px;
            left: 50px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

<script>
    // 1. Coordenadas aproximadas de las zonas de Cáceres
    const coordenadasCaceres = {
        "Plaza Mayor": [39.4745, -6.3713],
        "La Madrila": [39.4705, -6.3812],
        "Ruta de la Plata": [39.4678, -6.3850],
        "Centro Histórico": [39.4735, -6.3705],
        "Aldea Moret": [39.4580, -6.3980],
        "Mejostilla": [39.4930, -6.3680],
        "Universidad": [39.4780, -6.3420]
    };

    // 2. Datos JSON (Extraídos de tus archivos generados)
    // =========================================================================
    // INICIO CAMBIO: LEER ARCHIVO JSON EXTERNO
    // =========================================================================
    fetch('datos_mapa.json')
        .then(response => response.json())
        .then(datosRuido => {

    // 3. Capturar Parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const modoUrl = urlParams.get('modo') || 'datos'; // datos, mixto, alertas
    const fechaInicioStr = urlParams.get('fecha_inicio'); // ej: "June 12 2026"
    const fechaFinStr = urlParams.get('fecha_fin'); // ej: "June 14 2026"
    const horaInicioStr = urlParams.get('hora_inicio') || '00:00'; 
    const horaFinStr = urlParams.get('hora_fin') || '23:59';

    // Funciones auxiliares para fechas y horas
    function parseJsonDate(dateStr) {
        // Convierte "12/06/2026" a Date object
        const parts = dateStr.split('/');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }
    
    function parseHora(horaStr) {
        // Convierte "10:30:00" o "10:30" a minutos totales para comparar fácilmente
        const parts = horaStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

  // 3. PARSEO DE PARÁMETROS Y CONTROL DE VARIABLES
    let fechaInicioObj = fechaInicioStr ? new Date(fechaInicioStr) : null;
    
    function parseHora(horaStr) {
        if (!horaStr) return 0;
        const parts = horaStr.split(':');
        return parseInt(parts[0]) * 60 + (parseInt(parts[1]) || 0);
    }

    let minHoraInicio = parseHora(horaInicioStr);
    let maxHoraFin = parseHora(horaFinStr);
    let fechaTargetJson = "12/06/2026"; 

    // GENERADOR DE SEMILLA Y DÍA ALEATORIO SIN DATOS
    // GENERADOR DE DÍA SIN DATOS (Bloquea todo el año pasado)
    let esDiaSinDatos = false;
    if (fechaInicioObj) {
        // Obtenemos el año de la fecha que se ha pasado por la URL
        const anioSeleccionado = fechaInicioObj.getFullYear();
        
        // Si el año es menor que 2026 (por ejemplo, 2025), se marca como día sin datos
        if (anioSeleccionado < 2026) {
            esDiaSinDatos = true;
        }
    }

    // CÁCULO DEL BUCLE DE 3 DÍAS
    if (fechaInicioObj) {
        const fechaBase = new Date("June 11 2026");
        const diffTime = fechaInicioObj.getTime() - fechaBase.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        const ciclo = ((diffDays % 3) + 3) % 3; 

        if (ciclo === 0) fechaTargetJson = "12/06/2026";
        else if (ciclo === 1) fechaTargetJson = "13/06/2026";
        else if (ciclo === 2) fechaTargetJson = "14/06/2026";
    }

    // 4. FILTRADO DE DATOS RIGUROSO
    const datosFiltrados = datosRuido.filter(function(d) {
        if (esDiaSinDatos) return false;
        if (d.temporal.fecha !== fechaTargetJson) return false;
        
        let horaMinutos = parseHora(d.temporal.hora);
        if (horaMinutos < minHoraInicio || horaMinutos > maxHoraFin) return false;
        
        return true;
    });

    // GENERAR CARTEL FLOTANTE SI EL MAPA QUEDA VACÍO
    if (datosFiltrados.length === 0) {
        const cartelError = document.createElement('div');
        cartelError.innerHTML = `
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                        background: rgba(255, 255, 255, 0.98); padding: 25px 35px; border-radius: 12px; 
                        box-shadow: 0px 10px 30px rgba(0,0,0,0.3); text-align: center; z-index: 2000; 
                        font-family: Arial, sans-serif; border: 2px solid #d9534f; width: 320px;">
                <h3 style="color: #d9534f; margin: 0 0 10px 0; font-size: 22px;">⚠️ Alerta de Sistema</h3>
                <p style="margin: 0; color: #444; font-size: 15px; line-height: 1.4;">
                    ${esDiaSinDatos ? '<b>No hay datos disponibles.</b> NO se han detectado registros de ruido en este día.' : 'No se encontraron registros de ruido en el rango horario solicitado.'}
                </p>
            </div>
        `;
        document.body.appendChild(cartelError);
    }

    // 5. Agrupar y Calcular Medias por Zona
    const statsPorZona = {};
    datosFiltrados.forEach(d => {
        const zona = d.ubicacion.zona;
        if (!statsPorZona[zona]) {
            statsPorZona[zona] = { sumaPromedio: 0, count: 0, min: Infinity, max: -Infinity };
        }
        statsPorZona[zona].sumaPromedio += d.acustica.db_promedio_laeq;
        statsPorZona[zona].count += 1;
        
        if (d.acustica.db_minimo < statsPorZona[zona].min) statsPorZona[zona].min = d.acustica.db_minimo;
        if (d.acustica.db_maximo > statsPorZona[zona].max) statsPorZona[zona].max = d.acustica.db_maximo;
    });

    // 6. Inicializar el Mapa de Cáceres
    const map = L.map('map').setView([39.4764, -6.3722], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap Cáceres'
    }).addTo(map);

    // Definir colores del Heatmap según dB
    function getColor(d) {
        return d > 70 ? '#d73027' :  // Rojo (Alerta/Muy ruidoso)
               d > 60 ? '#fc8d59' :  // Naranja (Ruidoso)
               d > 50 ? '#fee08b' :  // Amarillo (Moderado)
                        '#1a9850';   // Verde (Tranquilo)
    }

    // 7. Dibujar las zonas en el mapa
    Object.keys(statsPorZona).forEach(zona => {
        if (coordenadasCaceres[zona]) {
            let stats = statsPorZona[zona];
            let media = stats.sumaPromedio / stats.count;

            let circle = L.circle(coordenadasCaceres[zona], {
                color: getColor(media),
                fillColor: getColor(media),
                fillOpacity: 0.6,
                radius: 400 // Tamaño de la zona
            }).addTo(map);

            // Tooltip que aparece al pasar el ratón (Hover)
            let tooltipContent = `
                <div style="text-align: center;">
                    <strong style="font-size:16px;">${zona}</strong><br><hr style="margin:5px 0;">
                    <b>Media:</b> ${media.toFixed(1)} dB<br>
                    <b>Máximo:</b> ${stats.max.toFixed(1)} dB<br>
                    <b>Mínimo:</b> ${stats.min.toFixed(1)} dB<br>
                    <small>(${stats.count} registros)</small>
                </div>
            `;
            circle.bindTooltip(tooltipContent, { sticky: true, className: 'custom-tooltip' });
        }
    });

    // 8. Crear la Leyenda
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        const grades = [0, 50, 60, 70];
        const labels = ['Tranquilo (<50 dB)', 'Moderado (50-60 dB)', 'Ruidoso (60-70 dB)', 'Alerta (>70 dB)'];

        div.innerHTML += '<strong>Nivel Acústico</strong><br>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                labels[i] + '<br>';
        }
        return div;
    };
    legend.addTo(map);
    })
        .catch(error => {
            console.error("Error crítico al cargar el archivo JSON:", error);
        });
    // =========================================================================
    // FIN CAMBIO
    // =========================================================================

</script>
</body>
</html>>
