<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ruido - Cáceres</title>
    
    <!-- Librería Leaflet para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* Estilos de la Leyenda */
        .info.legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            line-height: 1.5;
            color: #333;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
            border-radius: 50%;
        }
        
        /* Panel flotante de información de parámetros */
        #panel-info {
            position: absolute;
            top: 10px;
            left: 50px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

<script>

    // 1. Coordenadas aproximadas de las zonas de Cáceres
const coordenadasCaceres = {
    // Tus 7 zonas originales intactas
    "Plaza Mayor": [39.4745, -6.3713],
    "La Madrila": [39.4705, -6.3812],
    "Ruta de la Plata": [39.4678, -6.3850],
    "Centro Histórico": [39.4735, -6.3705],
    "Aldea Moret": [39.4580, -6.3980],
    "Mejostilla": [39.4930, -6.3680],
    "Universidad": [39.4780, -6.3420],
        "Paseo de Cánovas": [39.4702, -6.3758],
    "Nuevo Cáceres": [39.4622, -6.3745],
    "Estación de Autobuses y Trenes": [39.4645, -6.3892],
    "Recinto Ferial": [39.4897, -6.3787],
    "Macondo y El Peru": [39.4670, -6.3960],
    "Casa Plata": [39.4540, -6.3710]
};
    

const coordenadasCaceres = {
    "Plaza Mayor": [39.4745, -6.3713],
    "La Madrila": [39.4705, -6.3812],
    "Ruta de la Plata": [39.4678, -6.3850],
    "Centro Histórico": [39.4735, -6.3705],
    "Aldea Moret": [39.4580, -6.3980],
    "Mejostilla": [39.4930, -6.3680],
    "Universidad": [39.4780, -6.3420],
    "Paseo de Cánovas": [39.4702, -6.3758],
    "Nuevo Cáceres": [39.4622, -6.3745],
    "Estación de Autobuses y Trenes": [39.4645, -6.3892],
    "Recinto Ferial": [39.4897, -6.3787],
    "Macondo y El Peru": [39.4670, -6.3960],
    "Casa Plata": [39.4540, -6.3710]
};

function obtenerAlertasDesdeDB() {
    return new Promise((resolve, reject) => {
        // 1. Abrir (o crear) la base de datos de IndexedDB llamada 'MapaRuidoDB' (Versión 1)
        const request = indexedDB.open('MapaRuidoDB', 1);
        const datosEstaticosIniciales = [
            { "Ubicacion": "Centro Histórico", "DB": 78.3, "Criticidad": "Crítica", "Col_Porcentaje": 120, "Tipo_Limite": "OMS 2018", "Valor_Limite": 75 },
            { "Ubicacion": "Recinto Ferial", "DB": 83.4, "Criticidad": "Crítica", "Col_Porcentaje": 109, "Tipo_Limite": "ITU-T P.56", "Valor_Limite": 80 },
            { "Ubicacion": "Nuevo Cáceres", "DB": 58.3, "Criticidad": "Moderada", "Col_Porcentaje": 106, "Tipo_Limite": "Configurable", "Valor_Limite": 52.2 }
        ];

        // SI LA BD NO EXISTE, SE EJECUTA ESTE EVENTO PARA CREAR LA ESTRUCTURA
        request.onupgradeneeded = function(e) {
            const db = e.target.result;
            // Creamos el almacén de objetos 'alertas' usando 'Ubicacion' como clave primaria (ID)
            const objectStore = db.createObjectStore('alertas', { keyPath: 'Ubicacion' });
            
            // Insertamos los datos estáticos iniciales en la nueva BD
            datosEstaticosIniciales.forEach(alerta => {
                objectStore.add(alerta);
            });
            console.log("IndexedDB: Base de datos creada e inicializada con datos estáticos.");
        };

        request.onsuccess = function(e) {
            const db = e.target.result;
            const urlParams = new URLSearchParams(window.location.search);
            const accion = urlParams.get('accion');
            const idZona = urlParams.get('id');

            // Asegurar coordenadas iniciales en tu objeto global
            if (!coordenadasCaceres["Centro Histórico"]) coordenadasCaceres["Centro Histórico"] = [39.4735, -6.3705];
            if (!coordenadasCaceres["Recinto Ferial"]) coordenadasCaceres["Recinto Ferial"] = [39.4897, -6.3787];
            if (!coordenadasCaceres["Nuevo Cáceres"]) coordenadasCaceres["Nuevo Cáceres"] = [39.4622, -6.3745];

            // SI HAY UNA ACCIÓN EN LA URL (CRUD)
            if (accion && idZona) {
                const zonaDecodificada = decodeURIComponent(idZona);
                const transaction = db.transaction(['alertas'], 'readwrite');
                const store = transaction.objectStore('alertas');

                if (accion === 'borrar') {
                    store.delete(zonaDecodificada);
                    console.log("IndexedDB: Alerta eliminada ->", zonaDecodificada);
                } 
                else if (accion === 'anadir' || accion === 'actualizar') {
                    const nuevaAlerta = {
                        "Ubicacion": zonaDecodificada,
                        "DB": parseFloat(urlParams.get('db')) || 60.0,
                        "Criticidad": urlParams.get('severidad') || 'Moderada',
                        "Col_Porcentaje": parseInt(urlParams.get('porcentaje')) || 100,
                        "Tipo_Limite": urlParams.get('normativa') || 'Configurable',
                        "Valor_Limite": parseFloat(urlParams.get('limite')) || 50.0
                    };

                    if (!coordenadasCaceres[zonaDecodificada]) {
                        coordenadasCaceres[zonaDecodificada] = [39.4700, -6.3700];
                    }

                    store.put(nuevaAlerta); // 'put' actualiza si existe o añade si no existe
                    console.log(`IndexedDB: Alerta ${accion} ->`, zonaDecodificada);
                }

                // Esperamos a que la transacción termine para limpiar la URL y recargar la pantalla
                transaction.oncomplete = function() {
                    const modoActual = urlParams.get('modo') || 'mixto';
                    const nuevaUrl = window.location.origin + window.location.pathname + "?modo=" + modoActual;
                    window.location.href = nuevaUrl;
                };
                return;
            }

            // SI NO HAY ACCIÓN: Simplemente leemos todas las alertas de IndexedDB para pintarlas en Leaflet
            const tx = db.transaction(['alertas'], 'readonly');
            const store = tx.objectStore('alertas');
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                resolve(getAllRequest.result); // Devolvemos el array de alertas al Promise.all
            };
        };

        request.onerror = function(e) {
            console.error("Error al abrir IndexedDB", e);
            reject([]);
        };
    });
}

// Carga asíncrona simultánea
Promise.all([
    fetch('datos_mapa.json').then(res => res.json()).catch(() => []),
    obtenerAlertasDesdeDB() // <--- Aquí lee automáticamente de IndexedDB
])
.then(([datosRuido, datosAlertasRaw]) => {

        // Ejecutamos el mapeador flexible (Modificación 2)
        const alertasPredeterminadas = procesarJsonAlertas(datosAlertasRaw);
        // =========================================================================
        // MODIFICACIÓN 2: ADAPTADOR UNIVERSAL DE JSON DE ALERTAS
        // =========================================================================
        function procesarJsonAlertas(jsonOriginal) {
            const mapaResultante = {};

            // CASO A: Si el JSON es un Array de objetos [ {zona: "La Madrila", info: "..."}, ... ]
            if (Array.isArray(jsonOriginal)) {
                jsonOriginal.forEach(item => {
                    // Busca dinámicamente qué propiedad contiene el nombre de la zona
                    const campoZona = Object.keys(item).find(key => 
                        ['zona', 'ubicacion', 'nombre', 'place', 'location'].includes(key.toLowerCase())
                    );
                    if (campoZona && item[campoZona]) {
                        mapaResultante[item[campoZona]] = item; 
                    }
                });
            } 
            // CASO B: Si el JSON ya es un Objeto directo { "La Madrila": { ... }, "Plaza Mayor": { ... } }
            else if (typeof jsonOriginal === 'object' && jsonOriginal !== null) {
                return jsonOriginal; // Ya viene indexado por zona, lo usamos tal cual
            }

            return mapaResultante;
        }

        // Función auxiliar para pintar CUALQUIER variable del JSON en el Tooltip de forma bonita
        function generarHtmlDesconocido(objetoAlerta) {
            if (!objetoAlerta || typeof objetoAlerta !== 'object') return '';
            
            let html = '<div style="text-align: left; font-size: 12px; margin-top: 6px; padding: 6px; background: #fff3cd; border-radius: 4px; border: 1px solid #ffeeba; color: #856404;">';
            html += '<strong>⚠️ DETALLES DE ALERTA:</strong><br>';
            
            Object.keys(objetoAlerta).forEach(propiedad => {
                // Saltamos la propiedad de la zona para no repetirla en el tooltip
                if (['zona', 'ubicacion', 'nombre', 'place'].includes(propiedad.toLowerCase())) return;

                let claveLimpia = propiedad.replace(/_/g, ' ');
                claveLimpia = claveLimpia.charAt(0).toUpperCase() + claveLimpia.slice(1);
                
                let valor = objetoAlerta[propiedad];
                if (typeof valor === 'object') valor = JSON.stringify(valor);
                
                html += `<b>${claveLimpia}:</b> ${valor}<br>`;
            });
            
            html += '</div>';
            return html;
        }

        // 3. Capturar Parámetros de la URL (A partir de aquí tu código sigue igual...)
        const urlParams = new URLSearchParams(window.location.search);
        const modoUrl = urlParams.get('modo') || 'datos'; // datos, mixto, alertas
    // 3. Capturar Parámetros de la URL
    const fechaInicioStr = urlParams.get('fecha_inicio'); // ej: "June 12 2026"
    const fechaFinStr = urlParams.get('fecha_fin'); // ej: "June 14 2026"
    const horaInicioStr = urlParams.get('hora_inicio') || '00:00'; 
    const horaFinStr = urlParams.get('hora_fin') || '23:59';

    // Funciones auxiliares para fechas y horas
    function parseJsonDate(dateStr) {
        // Convierte "12/06/2026" a Date object
        const parts = dateStr.split('/');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }
    
    function parseHora(horaStr) {
        // Convierte "10:30:00" o "10:30" a minutos totales para comparar fácilmente
        const parts = horaStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

  // 3. PARSEO DE PARÁMETROS Y CONTROL DE VARIABLES
    let fechaInicioObj = fechaInicioStr ? new Date(fechaInicioStr) : null;
    
    function parseHora(horaStr) {
        if (!horaStr) return 0;
        const parts = horaStr.split(':');
        return parseInt(parts[0]) * 60 + (parseInt(parts[1]) || 0);
    }

    let minHoraInicio = parseHora(horaInicioStr);
    let maxHoraFin = parseHora(horaFinStr);
    let fechaTargetJson = "12/06/2026"; 

    // GENERADOR DE SEMILLA Y DÍA ALEATORIO SIN DATOS
    // GENERADOR DE DÍA SIN DATOS (Bloquea todo el año pasado)
    let esDiaSinDatos = false;
    if (fechaInicioObj) {
        // Obtenemos el año de la fecha que se ha pasado por la URL
        const anioSeleccionado = fechaInicioObj.getFullYear();
        
        // Si el año es menor que 2026 (por ejemplo, 2025), se marca como día sin datos
        if (anioSeleccionado < 2026) {
            esDiaSinDatos = true;
        }
    }

    // CÁCULO DEL BUCLE DE 3 DÍAS
    if (fechaInicioObj) {
        const fechaBase = new Date("June 11 2026");
        const diffTime = fechaInicioObj.getTime() - fechaBase.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        const ciclo = ((diffDays % 3) + 3) % 3; 

        if (ciclo === 0) fechaTargetJson = "12/06/2026";
        else if (ciclo === 1) fechaTargetJson = "13/06/2026";
        else if (ciclo === 2) fechaTargetJson = "14/06/2026";
    }

    // 4. FILTRADO DE DATOS RIGUROSO
    const datosFiltrados = datosRuido.filter(function(d) {
        if (esDiaSinDatos) return false;
        if (d.temporal.fecha !== fechaTargetJson) return false;
        
        let horaMinutos = parseHora(d.temporal.hora);
        if (horaMinutos < minHoraInicio || horaMinutos > maxHoraFin) return false;
        
        return true;
    });

    // GENERAR CARTEL FLOTANTE SI EL MAPA QUEDA VACÍO
    if (datosFiltrados.length === 0) {
        const cartelError = document.createElement('div');
        cartelError.innerHTML = `
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                        background: rgba(255, 255, 255, 0.98); padding: 25px 35px; border-radius: 12px; 
                        box-shadow: 0px 10px 30px rgba(0,0,0,0.3); text-align: center; z-index: 2000; 
                        font-family: Arial, sans-serif; border: 2px solid #d9534f; width: 320px;">
                <h3 style="color: #d9534f; margin: 0 0 10px 0; font-size: 22px;">⚠️ Alerta de Sistema</h3>
                <p style="margin: 0; color: #444; font-size: 15px; line-height: 1.4;">
                    ${esDiaSinDatos ? '<b>No hay datos disponibles.</b> NO se han detectado registros de ruido en este día.' : 'No se encontraron registros de ruido en el rango horario solicitado.'}
                </p>
            </div>
        `;
        document.body.appendChild(cartelError);
    }

    // 5. Agrupar y Calcular Medias por Zona
    const statsPorZona = {};
    datosFiltrados.forEach(d => {
        const zona = d.ubicacion.zona;
        if (!statsPorZona[zona]) {
            statsPorZona[zona] = { sumaPromedio: 0, count: 0, min: Infinity, max: -Infinity };
        }
        statsPorZona[zona].sumaPromedio += d.acustica.db_promedio_laeq;
        statsPorZona[zona].count += 1;
        
        if (d.acustica.db_minimo < statsPorZona[zona].min) statsPorZona[zona].min = d.acustica.db_minimo;
        if (d.acustica.db_maximo > statsPorZona[zona].max) statsPorZona[zona].max = d.acustica.db_maximo;
    });

    // 6. Inicializar el Mapa de Cáceres
    const map = L.map('map').setView([39.4764, -6.3722], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap Cáceres'
    }).addTo(map);

    // --- NUEVO: MAPA DE ALERTAS PREDETERMINADAS ---

    // Definir colores del Heatmap según dB
    function getColor(d) {
        return d > 70 ? '#d73027' :  // Rojo (Alerta/Muy ruidoso)
               d > 60 ? '#fc8d59' :  // Naranja (Ruidoso)
               d > 50 ? '#fee08b' :  // Amarillo (Moderado)
                        '#1a9850';   // Verde (Tranquilo)
    }

    // --- NUEVO: OBTENER TODAS LAS ZONAS ÚNICAS (De los datos + De las alertas fijas) ---

   // =========================================================================
    // MODIFICACIÓN 3: DIBUJAR ZONAS COMBINANDO AMBOS ESQUEMAS
    // =========================================================================
    
    // Unimos las zonas que tienen datos de ruido + las que tienen alertas del nuevo JSON
    const todasLasZonas = new Set([...Object.keys(statsPorZona), ...Object.keys(alertasPredeterminadas)]);

    todasLasZonas.forEach(zona => {
        if (!coordenadasCaceres[zona]) return; // Si la zona no tiene coordenadas, saltar

        const tieneDatos = !!statsPorZona[zona];
        const tieneAlertaFija = !!alertasPredeterminadas[zona];
        
        let stats = statsPorZona[zona] || { sumaPromedio: 0, count: 0, min: 0, max: 0 };
        let media = tieneDatos ? (stats.sumaPromedio / stats.count) : 0;

        // Estilos base por defecto (Modo Datos)
        let colorCirculo = getColor(media);
        let rellenoCirculo = getColor(media);
        let opacidadRelleno = 0.6;
        let pesoBorde = 1;
        let radioCirculo = 400;
        
        // Genera el HTML dinámicamente con lo que sea que venga en el JSON de alertas
        let contenidoAlertaHtml = tieneAlertaFija ? generarHtmlDesconocido(alertasPredeterminadas[zona]) : '';

        // INTERRUPTORES DE MODO (URL)
        if (modoUrl === 'alertas') {
            if (!tieneAlertaFija) return; // Si no hay alerta en esta zona, no se pinta
            colorCirculo = '#b2182b';
            rellenoCirculo = '#d73027';
            opacidadRelleno = 0.8;
            pesoBorde = 3;
        } 
        else if (modoUrl === 'mixto') {
            if (tieneAlertaFija) {
                colorCirculo = '#800026'; // Resaltado exterior burdeos
                pesoBorde = 4;
                radioCirculo = 460; // Un poco más grande para contraste
            }
            if (!tieneDatos && tieneAlertaFija) {
                rellenoCirculo = '#d73027'; // Si está en alerta pero no hay sensores, va en rojo suave
                opacidadRelleno = 0.3;
            }
        } 
        else {
            // Modo 'datos' estándar: Ignoramos la alerta si la zona no tiene registros en el JSON de ruido
            if (!tieneDatos) return;
        }

        // Pintar en Leaflet
        let circle = L.circle(coordenadasCaceres[zona], {
            color: colorCirculo,
            fillColor: rellenoCirculo,
            fillOpacity: opacidadRelleno,
            weight: pesoBorde,
            radius: radioCirculo
        }).addTo(map);

        let datosJsonHtml = tieneDatos ? `
            <b>Media:</b> ${media.toFixed(1)} dB<br>
            <b>Máximo:</b> ${stats.max.toFixed(1)} dB<br>
            <b>Mínimo:</b> ${stats.min.toFixed(1)} dB<br>
            <small>(${stats.count} registros)</small>
        ` : `<span style="color:#666; font-style:italic">Sin registros de sensores en este tramo.</span>`;

        let tooltipContent = `
            <div style="text-align: center; width: 220px;">
                <strong style="font-size:16px;">${zona}</strong><br><hr style="margin:5px 0;">
                ${datosJsonHtml}
                ${contenidoAlertaHtml}
            </div>
        `;
        
        circle.bindTooltip(tooltipContent, { sticky: true, className: 'custom-tooltip' });
    });

    // 8. Crear la Leyenda Dinámica según el modo
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        
        if (modoUrl === 'alertas') {
            div.innerHTML = `
                <strong>Leyenda: Alertas Activas</strong><br>
                <i style="background:#d73027; border: 2px solid #b2182b;"></i> Zona bajo Alerta Crítica<br>
                <small style="color:#666;">Filtros de sensores desactivados</small>
            `;
        } else if (modoUrl === 'mixto') {
            div.innerHTML = `
                <strong>Mapa Mixto (Sensores + Alertas)</strong><br>
                <i style="background:#d73027"></i> >70 dB<br>
                <i style="background:#fc8d59"></i> 60-70 dB<br>
                <i style="background:#fee08b"></i> 50-60 dB<br>
                <i style="background:#1a9850"></i> <50 dB<br>
                <hr style="margin:5px 0;">
                <span style="display:inline-block; width:14px; height:14px; border:3px solid #800026; border-radius:50%; margin-right:5px;"></span> <b>Zona con Alerta Fija</b>
            `;
        } else {
            // Modo datos normal
            const grades = [0, 50, 60, 70];
            const labels = ['Tranquilo (<50 dB)', 'Moderado (50-60 dB)', 'Ruidoso (60-70 dB)', 'Alerta (>70 dB)'];
            div.innerHTML += '<strong>Nivel Acústico (Sensores)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' + labels[i] + '<br>';
            }
        }
        return div;
    };
    legend.addTo(map);

    }) // Fin del .then(datosRuido => {
    .catch(error => {
        console.error("Error crítico al cargar el archivo JSON:", error);
    });
</script>
</body>
</html>
